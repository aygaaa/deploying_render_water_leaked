name: Build, Push to ACR & Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/aquaguard:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/aquaguard:latest

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: aquaguard-leakage
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/aquaguard:latest
